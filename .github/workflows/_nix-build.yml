# Reusable: Nix Build (macOS)
# Called by ci-gate.yml and ci-nix.yml
name: _nix-build

on:
  workflow_call:

# Performance: Cancel in-progress builds when new commits arrive
concurrency:
  group: nix-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Performance: Install Nix with CI-optimized settings
      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            max-jobs = auto
            cores = 0
            http-connections = 50
            max-substitution-jobs = 64
            connect-timeout = 5
            stalled-download-timeout = 10
            narinfo-cache-positive-ttl = 86400
            narinfo-cache-negative-ttl = 0
            fallback = false
            auto-optimise-store = false
            warn-dirty = false

      # Restore-only on PRs; saves on main. See .claude/rules/ci-workflows.md.
      - name: Cache Nix Store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-
          gc-max-store-size-macos: 5G
          save: ${{ github.ref == 'refs/heads/main' }}

      # Warn if nixpkgs is not at the Hydra-evaluated channel HEAD — cold builds are slow.
      # Not a hard failure: channel service may lag briefly; warning is sufficient signal.
      - name: Verify nixpkgs channel alignment
        run: ./scripts/workflows/check-nixpkgs-channel.sh

      - name: Start Build Timer
        id: build-timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Build Home Manager
        run: ./scripts/workflows/build-hm.sh result-hm

      - name: Verify Nix Symlinks
        run: ./scripts/workflows/verify-symlinks.sh result-hm/home-files

      - name: Build Timing
        if: always()
        run: |
          start="${{ steps.build-timer.outputs.start }}"
          if [ -n "$start" ]; then
            elapsed=$(( $(date +%s) - start ))
            echo "::notice::Build + verify completed in ${elapsed}s"
          fi
